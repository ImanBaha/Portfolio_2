name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_GITHUB_URL: ${{ vars.VITE_GITHUB_URL }}
          VITE_LINKEDIN_URL: ${{ vars.VITE_LINKEDIN_URL }}
          VITE_EMAIL: ${{ vars.VITE_EMAIL }}
          VITE_GITHUB_PROJECT1_URL: ${{ vars.VITE_GITHUB_PROJECT1_URL }}
          VITE_GITHUB_PROJECT2_URL: ${{ vars.VITE_GITHUB_PROJECT2_URL }}
          VITE_GITHUB_PROJECT3_URL: ${{ vars.VITE_GITHUB_PROJECT3_URL }}
          VITE_GITHUB_PROJECT4_URL: ${{ vars.VITE_GITHUB_PROJECT4_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
